<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BTC / Gold Ratio</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --ink: #e6edf3;
    --muted: #7d8590; --above: #3fb950; --below: #f85149;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    min-height: 100vh; display: grid; place-items: center; padding: 1.5rem;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  .card {
    background: rgba(22, 27, 34, 0.35);        /* was solid --panel; now 35% opacity */
    backdrop-filter: blur(8px);                 /* frosts whatever's behind it */
    -webkit-backdrop-filter: blur(8px);         /* Safari needs the prefix */
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 2.5rem 3rem; text-align: center; max-width: 34rem; width: 100%;
  }
  #art-layer {
    position: fixed; inset: 0; z-index: -1;
    background-size: cover; background-position: center;
    opacity: 1;                                 /* was 0.35 — show it fully now */
  }
  .eyebrow {
    color: var(--ink);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    display: inline-block;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid var(--above);      /* neon accent rule under the title */
  }
  .state {
    font-size: clamp(3rem, 12vw, 5.5rem); font-weight: 700;
    line-height: 1.05; margin: 0.5rem 0; text-transform: uppercase;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  .state.above { color: var(--above); }
  .state.below { color: var(--below); }
  .sub { color: var(--ink); font-size: 0.95rem; }
  .figures { display: flex; justify-content: center; gap: 2.5rem;
             margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #30363d; }
  .figure .label { color: var(--ink); font-size: 0.7rem;
                   letter-spacing: 0.1em; text-transform: uppercase; }
  .figure .value { font-size: 1.6rem; margin-top: 0.25rem; }
  .stamp { color: var(--ink); font-size: 0.75rem; margin-top: 1.5rem; }
  .chart { width: 100%; height: auto; margin-top: 2rem; display: block; }
</style>
</head>
<body>
  <div id="art-layer"></div>
  <main class="card">
    <p class="eyebrow">BTC / Gold ratio</p>
    <h1 id="state" class="state">—</h1>
    <p id="sub" class="sub">loading…</p>
    <div class="figures">
      <div class="figure">
        <div class="label">Ratio</div>
        <div id="ratio" class="value">—</div>
      </div>
      <div class="figure">
        <div class="label" id="ma-label">MA</div>
        <div id="ma" class="value">—</div>
      </div>
    </div>
    <canvas id="chart" class="chart" width="720" height="360"></canvas>
    <p id="stamp" class="stamp"></p>
  </main>

  <script src="data.js"></script>
  <script>
    const { latest, ma_window, updated } = DATA;

    const pool = DATA.art[latest.state] || [];
  const artLayer = document.getElementById("art-layer");

  function showRandomArt() {
    if (pool.length === 0) return;
    const pick = pool[Math.floor(Math.random() * pool.length)];
    artLayer.style.backgroundImage = `url("${pick}")`;
  }

  showRandomArt();                         // first image immediately on load
  if (pool.length > 1) {
    setInterval(showRandomArt, 3000);     // then a new random one every 10s
  }

    const stateEl = document.getElementById("state");
    stateEl.textContent = latest.state;
    stateEl.classList.add(latest.state);

    document.getElementById("sub").textContent =
      `Ratio is ${latest.state} its ${ma_window}-day moving average`;
    document.getElementById("ratio").textContent = latest.ratio.toFixed(4);
    document.getElementById("ma-label").textContent = `MA ${ma_window}`;
    document.getElementById("ma").textContent = latest.ma.toFixed(4);
    document.getElementById("stamp").textContent = `Updated ${updated}`;
    const series = DATA.series.filter(d => d.ma !== null);

  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const padL = 52, padR = 12, padT = 12, padB = 28;   // gutters for axis labels

  const values = series.flatMap(d => [d.ratio, d.ma]);
  const lo = Math.min(...values), hi = Math.max(...values);

  const x = i => padL + (i / (series.length - 1)) * (W - padL - padR);
  const y = v => H - padB - ((v - lo) / (hi - lo)) * (H - padT - padB);

  ctx.font = "11px ui-monospace, monospace";
  ctx.fillStyle = "#e6edf3";

  // y-axis: 4 gridlines + price labels
  const yTicks = 4;
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  for (let t = 0; t <= yTicks; t++) {
    const v = lo + (hi - lo) * (t / yTicks);
    const py = y(v);
    ctx.strokeStyle = "#21262d";                 // faint gridline
    ctx.beginPath();
    ctx.moveTo(padL, py);
    ctx.lineTo(W - padR, py);
    ctx.stroke();
    ctx.fillText(v.toFixed(1), padL - 8, py);    // label in left gutter
  }

  // x-axis: 5 date labels sampled across the range
  const xTicks = 5;
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  for (let t = 0; t <= xTicks; t++) {
    const i = Math.round((series.length - 1) * (t / xTicks));
    const label = series[i].date.slice(5);       // "MM-DD" from "YYYY-MM-DD"
    ctx.fillText(label, x(i), H - padB + 8);
  }

  function line(key, color, width) {
    ctx.beginPath();
    series.forEach((d, i) => {
      const px = x(i), py = y(d[key]);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    });
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.shadowColor = "rgba(0,0,0,0.7)";
    ctx.shadowBlur = 3;
    ctx.stroke();
  }

  // regime fill
  series.forEach((d, i) => {
    if (i === 0) return;
    const prev = series[i - 1];
    ctx.beginPath();
    ctx.moveTo(x(i - 1), y(prev.ratio));
    ctx.lineTo(x(i),     y(d.ratio));
    ctx.lineTo(x(i),     y(d.ma));
    ctx.lineTo(x(i - 1), y(prev.ma));
    ctx.closePath();
    ctx.fillStyle = d.ratio >= d.ma
      ? "rgba(63,185,80,0.15)" : "rgba(248,81,73,0.15)";
    ctx.fill();
  });

  line("ma", "#7d8590", 1);
  line("ratio", "#e6edf3", 2);
  </script>
</body>
</html>
