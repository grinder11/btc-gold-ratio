name: Daily ratio update

on:
  schedule:
    - cron: '0 13 * * *'      # 13:00 UTC daily (~6am Pacific)
  workflow_dispatch:           # also lets you trigger it by hand

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allow the job to commit back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run analysis
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: python analyze.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.js
          git commit -m "Auto-update ratio data" || echo "No changes"
          git push
